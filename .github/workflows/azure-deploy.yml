name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

env:
  AZURE_CONTAINER_REGISTRY: "atklhubregistry"
  RESOURCE_GROUP: "atklhub-rg"

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    # - name: Run Feature Tests
    #   run: |
    #     pip install -r feature-tests/requirements.txt
    #     pytest feature-tests/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Data Service
      uses: docker/build-push-action@v3
      with:
        context: ./data-service
        push: true
        tags: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/dataservice:${{ github.sha }}

    - name: Build and push Middle Tier
      uses: docker/build-push-action@v3
        with:
        context: ./middle-tier
        push: true
        tags: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/middletier:${{ github.sha }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v3
      with:
        context: ./frontend
        push: true
        tags: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Add the Azure CLI or equivalent App Service Container deployment step here
    - name: Deploy to Azure App Service
      run: |
        echo "Configure this step with azure-cli to restart the multi-container app on App Service"
        # az webapp config container set --name atklhub --resource-group ${{ env.RESOURCE_GROUP }} --multicontainer-config-file docker-compose.yml
